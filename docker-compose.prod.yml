# Production stack — runs on the deploy server.
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Redis is NOT managed here — it runs separately; point REDIS_URL at it in .env.
#
# Requires a .env file next to this compose with at least:
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
#   JWT_ACCESS_SECRET / JWT_REFRESH_SECRET
#   REDIS_URL           (your external Redis, e.g. redis://10.0.0.5:6379)
#   ROOT_DOMAIN=upstock.my.id
#   CORS_ORIGINS        (e.g. https://upstock.my.id)
#   COOKIE_DOMAIN=.upstock.my.id (as needed)
#   DOCKERHUB_USERNAME (defaults to mhdfauzan016), IMAGE_TAG (defaults to latest)

services:
  api:
    image: ${DOCKERHUB_USERNAME:-mhdfauzan016}/upstock-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: [.env]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?schema=public
      # REDIS_URL comes from .env (external Redis, managed outside this compose).
    networks:
      - shared-network
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    image: ${DOCKERHUB_USERNAME:-mhdfauzan016}/upstock-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - shared-network
    depends_on:
      - api

networks:
  shared-network:
    external: true

volumes:
  pgdata:
